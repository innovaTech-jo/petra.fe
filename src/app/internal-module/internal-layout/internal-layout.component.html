<div class="app-shell" dir="rtl">
  <section class="dashboard-frame" [class.menu-open]="isMenuOpen">
    <button class="mobile-backdrop" type="button" (click)="closeMenu()" aria-label="اغلاق القائمة"></button>

    <main class="content-panel">
      <header class="content-toolbar">
        <button class="mobile-menu-btn" type="button" (click)="toggleMenu()" aria-label="فتح القائمة">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16" />
          </svg>
        </button>
        <div class="content-toolbar-cluster">
          @if (sessionDisplayName()) {
            <span class="content-user-name">{{ sessionDisplayName() }}</span>
          }
          <div class="mobile-brand" aria-hidden="true">
            <img src="petra_logo_web.svg" alt="" class="mobile-brand-logo" />
          </div>
        </div>
      </header>

      <router-outlet></router-outlet>
    </main>

    <aside class="sidebar-panel" [class.open]="isMenuOpen">
      <button class="close-menu-btn" type="button" (click)="closeMenu()" aria-label="اغلاق القائمة">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m6 6 12 12M18 6 6 18" />
        </svg>
      </button>

      <div class="logo-card">
        <img class="brand-logo" src="petra_logo_web.svg" alt="Petra logo" />
        <p class="logo-sub">لوحة الإدارة</p>
      </div>

      <div class="sidebar-user-row">
        @if (sessionDisplayName()) {
          <span class="content-user-name">{{ sessionDisplayName() }}</span>
        }
      </div>

      <nav class="menu-list" aria-label="القائمة الرئيسية">
        <a
          class="menu-item"
          [routerLink]="internalRoot"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeMenu()"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12 12 4l8 8v8H4z" /></svg>
          <span>الرئيسية</span>
        </a>

        <a class="menu-item" routerLink="/internal/users" routerLinkActive="active" (click)="closeMenu()">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16" /></svg>
          <span>المستخدمون</span>
        </a>

        <a class="menu-item" routerLink="/internal/user-roles" routerLinkActive="active" (click)="closeMenu()">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z" /><path d="M4 20a8 8 0 0 1 16 0" /></svg>
          <span>أدوار المستخدمين</span>
        </a>

        <p class="nav-section">خدمات</p>

        <a class="menu-item" routerLink="/internal/request-types" routerLinkActive="active" (click)="closeMenu()">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h10M4 18h14" /></svg>
          <span>أنواع الخدمات</span>
        </a>

        <a class="menu-item" routerLink="/internal/integration-types" routerLinkActive="active" (click)="closeMenu()">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v18M3 12h18" /></svg>
          <span>أنواع التكامل</span>
        </a>

        <a class="menu-item" routerLink="/internal/attachment-types" routerLinkActive="active" (click)="closeMenu()">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><path d="M14 2v6h6" /></svg>
          <span>أنواع المرفقات</span>
        </a>

        <a class="menu-item" routerLink="/internal/login" (click)="logout(); closeMenu()">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 6h8v12h-8" /><path d="M14 12H4" /><path d="m7 9-3 3 3 3" /></svg>
          <span>تسجيل خروج</span>
        </a>
      </nav>
    </aside>
  </section>
</div>
