@if (notificationService.toast(); as t) {
  <div class="toast-banner" [class.error]="t.type === 'error'" role="status">
    {{ t.text }}
    <button type="button" class="toast-dismiss" (click)="notificationService.dismiss()">×</button>
  </div>
}

<section class="role-form-page wf-form-page" dir="rtl">
  <header class="form-page-header">
    <a class="back-link" routerLink="/internal/request-types">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m14 7-5 5 5 5M19 12H9" /></svg>
      <span>رجوع لأنواع الخدمات</span>
    </a>
    <h1>سير العمل</h1>
    @if (requestTypeTitle) {
      <p class="form-page-subtitle">نوع الخدمة: {{ requestTypeTitle }}</p>
    }
  </header>

  <div class="wizard-panel wf-meta">
    <label class="form-field"><span>الاسم بالعربية</span>
      <input class="u-input" [(ngModel)]="editing.nameAr" name="nameAr" /></label>
    <label class="form-field"><span>الاسم بالإنجليزية</span>
      <input class="u-input" [(ngModel)]="editing.nameOt" name="nameOt" /></label>
    <div class="toggle-row">
      <span>نشط</span>
      <p-toggleswitch [ngModel]="editing.active === 1" (ngModelChange)="setActiveFromToggle($event)" [ngModelOptions]="{ standalone: true }" />
    </div>
  </div>

  <div class="steps-section">
    <div class="grid-head">
      <h3>خطوات سير العمل</h3>
      <button type="button" class="mini-add" (click)="addStep()">+ إضافة خطوة</button>
    </div>

    @for (step of editing.steps; track $index; let i = $index) {
      <article class="step-card">
        <header class="step-card-head">
          <strong>الخطوة {{ i + 1 }}</strong>
          <div class="step-actions">
            <button type="button" class="icon-btn" (click)="moveStep(i, -1)" [disabled]="i === 0">↑</button>
            <button type="button" class="icon-btn" (click)="moveStep(i, 1)" [disabled]="i === (editing.steps!.length - 1)">↓</button>
            <button type="button" class="row-del" (click)="removeStep(i)">حذف</button>
          </div>
        </header>
        <div class="step-grid">
          <label class="form-field"><span>الاسم (عربي)</span>
            <input class="u-input" [(ngModel)]="step.nameAr" [name]="'snAr' + i" /></label>
          <label class="form-field"><span>الاسم (English)</span>
            <input class="u-input" [(ngModel)]="step.nameOt" [name]="'snOt' + i" /></label>
          <label class="check-row">
            <input type="checkbox" [checked]="step.isArchivedStep" (change)="onArchivedChange(step, $any($event.target).checked)" />
            <span>خطوة أرشيف</span>
          </label>
          <label class="check-row">
            <input type="checkbox" [(ngModel)]="step.requireNote" [name]="'noteReq' + i" />
            <span>ملاحظة مطلوبة</span>
          </label>
          @if (step.requireNote) {
            <label class="form-field full-span"><span>نص الملاحظة</span>
              <input class="u-input" [(ngModel)]="step.notePrompt" [name]="'notePrompt' + i" /></label>
          }
          <label class="form-field full-span"><span>أدوار الموافقة</span>
            <p-multiselect
              [options]="roleOptions"
              [(ngModel)]="step.approveRoleIds"
              [name]="'appr' + i"
              optionLabel="label"
              optionValue="value"
              placeholder="اختر الأدوار"
              styleClass="wf-multiselect"
              [ngModelOptions]="{ standalone: false }"
            /></label>
          <label class="form-field full-span"><span>أدوار الرفض</span>
            <p-multiselect
              [options]="roleOptions"
              [(ngModel)]="step.rejectRoleIds"
              [name]="'rej' + i"
              optionLabel="label"
              optionValue="value"
              placeholder="اختر الأدوار"
              styleClass="wf-multiselect"
            /></label>
          <label class="form-field full-span"><span>أدوار التخطي</span>
            <p-multiselect
              [options]="roleOptions"
              [(ngModel)]="step.skipRoleIds"
              [name]="'skip' + i"
              optionLabel="label"
              optionValue="value"
              placeholder="اختر الأدوار"
              styleClass="wf-multiselect"
            /></label>
        </div>
      </article>
    }
  </div>

  <footer class="wizard-footer">
    <button type="button" class="cancel-btn" routerLink="/internal/request-types">إلغاء</button>
    <button type="button" class="save-btn primary-save" [disabled]="!canSave() || saving" (click)="save()">
      {{ saving ? 'جاري الحفظ...' : 'حفظ سير العمل' }}
    </button>
  </footer>
</section>
