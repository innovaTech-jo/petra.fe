@if (showSplash) {
  <section class="app-splash" aria-live="polite">
    <div class="splash-aurora splash-aurora-one"></div>
    <div class="splash-aurora splash-aurora-two"></div>

    <div class="splash-core">
      <div class="splash-orbit" aria-hidden="true"></div>
      <div class="splash-orbit reverse" aria-hidden="true"></div>

      <div class="splash-logo-wrap">
        <img src="petra_logo_web.svg" alt="Petra logo" class="splash-logo" />
      </div>
      <br />
      <p class="splash-subtitle">جاري تجهيز النظام، لحظات ونبدأ</p>

      <div class="splash-progress" aria-hidden="true"><span></span></div>
    </div>
  </section>
}

<router-outlet></router-outlet>
